<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduQuiz — Units 1 & 2 English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f7fb;
    --surface:#ffffff;
    --surface2:#f0f0f8;
    --surface3:#e4e4f0;
    --accent:#7c6ff7;
    --accent2:#a78bfa;
    --accent3:#6d5ce6;
    --green:#16a37f;
    --red:#e05252;
    --yellow:#d97706;
    --text:#1a1830;
    --text2:#4a4670;
    --text3:#8884aa;
    --border:rgba(124,111,247,0.2);
    --border2:rgba(124,111,247,0.1);
    --glow:rgba(124,111,247,0.08);
    --font:'Sora',sans-serif;
    --mono:'Space Mono',monospace;
    --shadow:0 2px 12px rgba(100,90,200,0.08);
    --shadow2:0 4px 24px rgba(100,90,200,0.13);
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,111,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,111,247,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;box-shadow:var(--shadow)}
  .nav-logo{font-family:var(--mono);font-size:15px;color:var(--accent);letter-spacing:0.05em}
  .nav-logo span{color:var(--text2);opacity:0.6}
  .nav-right{display:flex;align-items:center;gap:12px}
  .xp-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent3);font-weight:600;font-family:var(--mono)}
  .streak-badge{background:#fffbeb;border:1px solid rgba(217,119,6,0.25);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--yellow);font-weight:600;font-family:var(--mono)}

  /* MAIN LAYOUT */
  .main{display:grid;grid-template-columns:280px 1fr;min-height:100vh;padding-top:56px;position:relative;z-index:1}

  /* SIDEBAR */
  .sidebar{background:var(--surface);border-right:1px solid var(--border2);padding:20px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px);box-shadow:2px 0 12px rgba(100,90,200,0.05)}
  .sidebar-section{margin-bottom:24px}
  .sidebar-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:var(--text3);margin-bottom:12px;padding-left:4px}
  .module-btn{width:100%;text-align:left;background:transparent;border:1px solid transparent;border-radius:10px;padding:10px 12px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;font-family:var(--font)}
  .module-btn:hover{background:var(--surface2);border-color:var(--border)}
  .module-btn.active{background:linear-gradient(135deg,rgba(124,111,247,0.1),rgba(167,139,250,0.06));border-color:var(--border);box-shadow:inset 0 0 20px rgba(124,111,247,0.04)}
  .module-btn-label{font-size:12px;color:var(--text3);font-weight:400;margin-bottom:2px}
  .module-btn-name{font-size:13px;color:var(--text);font-weight:500}
  .module-btn.active .module-btn-name{color:var(--accent3)}
  .progress-mini{width:100%;height:3px;background:var(--surface3);border-radius:3px;margin-top:6px;overflow:hidden}
  .progress-mini-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s ease}
  .progress-mini-fill.done{background:var(--green)}

  /* STATS SIDEBAR */
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px}
  .stat-label{font-size:11px;color:var(--text3);font-weight:500}
  .stat-val{font-family:var(--mono);font-size:13px;color:var(--accent3);font-weight:700}
  .stat-val.green{color:var(--green)}
  .stat-val.yellow{color:var(--yellow)}
  .stat-val.red{color:var(--red)}

  /* CONTENT */
  .content{padding:28px 32px;max-width:760px}

  /* HEADER */
  .unit-header{margin-bottom:28px}
  .unit-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(124,111,247,0.08);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--accent3);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px}
  .unit-tag-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .unit-title{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;color:var(--text)}
  .unit-subtitle{font-size:13px;color:var(--text2)}

  /* PROGRESS BAR */
  .prog-container{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:16px 20px;margin-bottom:24px;box-shadow:var(--shadow)}
  .prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .prog-label{font-size:12px;color:var(--text2);font-weight:500}
  .prog-count{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .prog-bar{width:100%;height:8px;background:var(--surface3);border-radius:8px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:8px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 8px rgba(124,111,247,0.3)}

  /* QUESTION CARD */
  .q-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;margin-bottom:16px;transition:all 0.3s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.3s}
  .q-card.answered::before{opacity:1}
  .q-card.correct-card{border-color:rgba(22,163,127,0.3);background:rgba(22,163,127,0.03)}
  .q-card.wrong-card{border-color:rgba(224,82,82,0.3);background:rgba(224,82,82,0.03)}
  .q-num{font-family:var(--mono);font-size:11px;color:var(--text3);font-weight:700;letter-spacing:0.1em;margin-bottom:12px}
  .q-text{font-size:15px;line-height:1.7;color:var(--text);margin-bottom:20px;font-weight:400}
  .q-blank{display:inline-block;min-width:100px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:600;text-align:center;padding:0 4px;margin:0 4px;font-style:normal}

  /* WORD TOOLTIP on answered cards */
  .q-text.clickable-words span.word{cursor:pointer;border-radius:3px;padding:0 2px;transition:background 0.15s}
  .q-text.clickable-words span.word:hover{background:rgba(124,111,247,0.12)}
  .word-tooltip{position:absolute;background:var(--text);color:#fff;font-size:12px;padding:5px 10px;border-radius:8px;white-space:nowrap;z-index:999;pointer-events:none;font-family:var(--font);font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.18);transform:translateX(-50%);transition:opacity 0.15s}
  .word-tooltip::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-width:5px 5px 0;border-style:solid;border-color:var(--text) transparent transparent}

  /* TEXT MODE DROPDOWN */
  .q-dropdown-wrap{display:inline-flex;align-items:center;margin:0 4px;position:relative}
  .q-dropdown{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:4px 28px 4px 10px;cursor:pointer;outline:none;transition:all 0.2s;-webkit-appearance:none;appearance:none;min-width:140px}
  .q-dropdown:hover,.q-dropdown:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,247,0.12)}
  .q-dropdown.correct-sel{border-color:var(--green);color:var(--green);background:rgba(22,163,127,0.07)}
  .q-dropdown.wrong-sel{border-color:var(--red);color:var(--red);background:rgba(224,82,82,0.07)}
  .dropdown-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:10px}

  /* DROPDOWN FEEDBACK BUBBLE */
  .dropdown-feedback{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:12px;padding:7px 12px;border-radius:10px;white-space:nowrap;z-index:200;font-family:var(--font);line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.18);min-width:180px;text-align:left}
  .dropdown-feedback::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border-width:0 5px 5px;border-style:solid;border-color:transparent transparent var(--text)}
  .dropdown-feedback.show{display:block;animation:fadeInDown 0.2s ease}
  .dropdown-feedback.green{background:#16a37f}
  .dropdown-feedback.green::before{border-color:transparent transparent #16a37f}
  .dropdown-feedback.red{background:#c0392b}
  .dropdown-feedback.red::before{border-color:transparent transparent #c0392b}
  @keyframes fadeInDown{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* OPTIONS GRID */
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt-btn{background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:12px 16px;text-align:left;cursor:pointer;transition:all 0.25s;font-family:var(--font);font-size:13px;color:var(--text2);font-weight:400;display:flex;align-items:flex-start;gap:10px;position:relative;overflow:hidden}
  .opt-btn:hover:not(:disabled){background:var(--surface3);border-color:var(--border);color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow)}
  .opt-btn:disabled{cursor:default}
  .opt-letter{width:20px;height:20px;border-radius:6px;background:var(--surface3);font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.2s}
  .opt-btn.selected .opt-letter{background:var(--accent);color:white}
  .opt-btn.correct-opt{border-color:rgba(22,163,127,0.5);background:rgba(22,163,127,0.07);color:var(--green)}
  .opt-btn.correct-opt .opt-letter{background:var(--green);color:white}
  .opt-btn.wrong-opt{border-color:rgba(224,82,82,0.5);background:rgba(224,82,82,0.07);color:var(--red)}
  .opt-btn.wrong-opt .opt-letter{background:var(--red);color:white}
  .opt-btn.reveal-correct{border-color:rgba(22,163,127,0.3);background:rgba(22,163,127,0.04);color:var(--green)}
  .opt-btn.reveal-correct .opt-letter{background:rgba(22,163,127,0.25);color:var(--green)}

  /* FEEDBACK */
  .feedback{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;display:none}
  .feedback.show{display:flex;align-items:flex-start;gap:10px}
  .feedback.correct-fb{background:rgba(22,163,127,0.08);border:1px solid rgba(22,163,127,0.25);color:var(--green)}
  .feedback.wrong-fb{background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.25);color:var(--red)}
  .fb-icon{font-size:16px;flex-shrink:0;margin-top:1px}
  .fb-translation{display:block;font-size:12px;margin-top:4px;opacity:0.85;color:var(--text2)}

  /* TEXT EXERCISE CARD */
  .text-exercise{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;margin-bottom:16px;box-shadow:var(--shadow)}
  .text-exercise-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .text-exercise-title::after{content:'';flex:1;height:1px;background:var(--border2)}
  .text-body{font-size:15px;line-height:2.3;color:var(--text2);font-weight:400}

  /* CONTROLS */
  .controls{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
  .ctrl-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text2);font-weight:500;transition:all 0.2s;white-space:nowrap;box-shadow:var(--shadow)}
  .ctrl-btn:hover{background:var(--surface2);color:var(--text);border-color:rgba(124,111,247,0.35)}
  .ctrl-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent;box-shadow:0 4px 16px rgba(124,111,247,0.25)}
  .ctrl-btn.primary:hover{box-shadow:0 6px 24px rgba(124,111,247,0.4);transform:translateY(-1px)}
  .ctrl-btn.danger{border-color:rgba(224,82,82,0.3);color:var(--red)}
  .ctrl-btn.danger:hover{background:rgba(224,82,82,0.07)}

  /* RESULTS PANEL */
  .results-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;display:none;box-shadow:var(--shadow2)}
  .results-panel.show{display:block;animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1)}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .results-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .r-stat{background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
  .r-stat-val{font-family:var(--mono);font-size:24px;font-weight:700;margin-bottom:4px}
  .r-stat-label{font-size:11px;color:var(--text3);font-weight:500}
  .r-stat-val.a{color:var(--accent2)}
  .r-stat-val.g{color:var(--green)}
  .r-stat-val.r{color:var(--red)}
  .r-stat-val.y{color:var(--yellow)}
  .perf-bar-wrap{margin-bottom:16px}
  .perf-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
  .perf-bar{height:10px;background:var(--surface3);border-radius:10px;overflow:hidden}
  .perf-fill{height:100%;border-radius:10px;transition:width 1s ease}
  .perf-fill.g{background:linear-gradient(90deg,#16a37f,#34d399)}
  .perf-fill.r{background:linear-gradient(90deg,#e05252,#f87171)}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:9999;transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow2)}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success-t{border-color:rgba(22,163,127,0.4);background:rgba(22,163,127,0.06);color:var(--green)}
  .toast.error-t{border-color:rgba(224,82,82,0.4);background:rgba(224,82,82,0.06);color:var(--red)}

  /* RESPONSIVE */
  @media(max-width:900px){
    .main{grid-template-columns:1fr}
    .sidebar{position:relative;height:auto;top:auto;max-height:280px;border-right:none;border-bottom:1px solid var(--border2)}
    .content{padding:20px}
    .results-grid{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:500px){
    .options-grid{grid-template-columns:1fr}
    .controls{flex-direction:column}
  }

  .q-card{animation:fadeIn 0.3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">EDU<span>/</span>QUIZ</div>
  <div class="nav-right">
    <div class="streak-badge" id="streakBadge">🔥 0 racha</div>
    <div class="xp-badge" id="xpBadge">✦ 0 XP</div>
  </div>
</nav>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Módulos</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Rendimiento</div>
      <div class="stat-row"><span class="stat-label">Preguntas totales</span><span class="stat-val" id="statTotal">0</span></div>
      <div class="stat-row"><span class="stat-label">Correctas</span><span class="stat-val green" id="statCorrect">0</span></div>
      <div class="stat-row"><span class="stat-label">Incorrectas</span><span class="stat-val red" id="statWrong">0</span></div>
      <div class="stat-row"><span class="stat-label">Tasa de acierto</span><span class="stat-val yellow" id="statRate">—</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Sesión actual</div>
      <div class="stat-row"><span class="stat-label">XP ganado</span><span class="stat-val" id="statXP" style="color:var(--accent3)">0</span></div>
      <div class="stat-row"><span class="stat-label">Racha máx.</span><span class="stat-val yellow" id="statMaxStreak">0</span></div>
      <div class="stat-row"><span class="stat-label">Tiempo sesión</span><span class="stat-val" id="statTime" style="color:var(--text2)">00:00</span></div>
    </div>
  </aside>

  <main class="content" id="mainContent"></main>
</div>

<div class="toast" id="toast"></div>

<!-- WORD TOOLTIP -->
<div class="word-tooltip" id="wordTooltip" style="display:none;position:fixed;"></div>

     {type:"text",content:" videogames. My brother always "},
     {type:"drop",id:"u2d4",c:"watches",opts:["is watching","are watching","watch","watches"],trans:"ve (siempre)"},
     {type:"text",content:" football on TV. Listen! The baby "},
     {type:"drop",id:"u2d5",c:"is crying",opts:["cries","cry","is crying","are crying"],trans:"está llorando"},
     {type:"text",content:". My friend "},
     {type:"drop",id:"u2d6",c:"doesn't go",opts:["isn't going","aren't going","doesn't go","don't go"],trans:"no va (nunca)"},
     {type:"text",content:" to the gym every day. The boys "},
     {type:"drop",id:"u2d7",c:"are studying",opts:["study","studies","is studying","are studying"],trans:"están estudiando"},
     {type:"text",content:" at the moment, so please don't talk to them."}
   ]
  }
];

// ============================================================
// STATE
// ============================================================
let state = {
  xp:0,streak:0,maxStreak:0,totalAnswered:0,totalCorrect:0,
  sessionStart:Date.now(),
  moduleProgress:{},
  questionStates:{}
};

function getModuleKey(q){ return q.m+'||'+q.t+'||'+q.u; }
function getModuleLabel(q){ return q.t+' — '+q.u; }
function getModuleGroup(q){ return q.m; }

let modules={};
ALL_QUESTIONS.forEach((q,i)=>{
  const key=getModuleKey(q);
  if(!modules[key]) modules[key]={key,label:getModuleLabel(q),group:getModuleGroup(q),questions:[],indices:[]};
  modules[key].questions.push(q);
  modules[key].indices.push(i);
});
const moduleKeys=Object.keys(modules);
let currentModule=moduleKeys[0];

function initModuleProgress(){
  moduleKeys.forEach(k=>{
    if(!state.moduleProgress[k]) state.moduleProgress[k]={answered:0,correct:0};
  });
}
initModuleProgress();

// Timer
setInterval(()=>{
  const s=Math.floor((Date.now()-state.sessionStart)/1000);
  const m=Math.floor(s/60).toString().padStart(2,'0');
  const sec=(s%60).toString().padStart(2,'0');
  document.getElementById('statTime').textContent=m+':'+sec;
},1000);

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar(){
  const sec=document.querySelector('.sidebar-section');
  const title=sec.querySelector('.sidebar-title');
  sec.innerHTML='';
  sec.appendChild(title);
  const groups={};
  moduleKeys.forEach(k=>{
    const g=modules[k].group;
    if(!groups[g]) groups[g]=[];
    groups[g].push(k);
  });
  Object.entries(groups).forEach(([group,keys])=>{
    const groupEl=document.createElement('div');
    groupEl.style.cssText='font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);padding:8px 4px 4px;';
    groupEl.textContent=group;
    sec.appendChild(groupEl);
    keys.forEach(k=>{
      const mod=modules[k];
      const prog=state.moduleProgress[k]||{answered:0,correct:0};
      const total=mod.questions.length;
      const pct=total>0?Math.round(prog.answered/total*100):0;
      const done=prog.answered>=total;
      const btn=document.createElement('button');
      btn.className='module-btn'+(k===currentModule?' active':'');
      btn.dataset.key=k;
      const rate=prog.answered>0?Math.round(prog.correct/prog.answered*100):null;
      btn.innerHTML=`
        <div class="module-btn-label">${mod.questions.length} preguntas${rate!==null?' · '+rate+'% ✓':''}</div>
        <div class="module-btn-name">${mod.label}</div>
        <div class="progress-mini"><div class="progress-mini-fill${done?' done':''}" style="width:${pct}%"></div></div>
      `;
      btn.addEventListener('click',()=>{ currentModule=k; renderSidebar(); renderContent(); });
      sec.appendChild(btn);
    });
  });
}

function updateStats(){
  const total=state.totalAnswered;
  const correct=state.totalCorrect;
  const wrong=total-correct;
  const rate=total>0?Math.round(correct/total*100)+'%':'—';
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
  document.getElementById('statRate').textContent=rate;
  document.getElementById('statXP').textContent=state.xp;
  document.getElementById('statMaxStreak').textContent=state.maxStreak;
  document.getElementById('xpBadge').textContent='✦ '+state.xp+' XP';
  document.getElementById('streakBadge').textContent='🔥 '+state.streak+' racha';
}

// ============================================================
// CONTENT RENDER
// ============================================================
function renderContent(){
  const content=document.getElementById('mainContent');
  const mod=modules[currentModule];
  const prog=state.moduleProgress[currentModule]||{answered:0,correct:0};
  const total=mod.questions.length;
  const pct=total>0?Math.round(prog.answered/total*100):0;
  const isText=mod.questions.some(q=>q.mode==='text');
  let html=`
    <div class="unit-header">
      <div class="unit-tag"><span class="unit-tag-dot"></span>${mod.group}</div>
      <div class="unit-title">${mod.label}</div>
      <div class="unit-subtitle">${total} preguntas · ${mod.group}</div>
    </div>
    <div class="prog-container">
      <div class="prog-header">
        <span class="prog-label">Progreso del módulo</span>
        <span class="prog-count" id="progCount">${prog.answered} / ${total} respondidas · ${prog.correct} correctas</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--green)">✓ ${prog.correct} correctas</span>
        <span style="font-size:11px;color:var(--red)">✗ ${prog.answered-prog.correct} incorrectas</span>
        <span style="font-size:11px;color:var(--text3)">${total-prog.answered} pendientes</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn primary" onclick="checkAllAndShowResults()">Ver resultados</button>
      <button class="ctrl-btn" onclick="resetModule()">↺ Reiniciar módulo</button>
      <button class="ctrl-btn" onclick="revealAll()">👁 Mostrar todas</button>
    </div>
    <div class="results-panel" id="resultsPanel"></div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:16px;padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border2)">
      💡 <strong>Tip:</strong> Tras contestar, haz clic en cualquier palabra de la pregunta para ver su traducción.
    </div>
  `;
  if(isText){
    html+=renderTextExercise(mod.questions.find(q=>q.mode==='text'));
  } else {
    mod.questions.forEach((q,i)=>{ html+=renderMCQ(q,i,currentModule); });
  }
  content.innerHTML=html;
  if(isText){
    content.querySelectorAll('.q-dropdown').forEach(sel=>{
      sel.addEventListener('change',function(){ handleDropdownChange(this,currentModule); });
    });
  }
}

// ============================================================
// TEXT EXERCISE
// ============================================================
function renderTextExercise(q){
  let html=`<div class="text-exercise" id="textEx">
    <div class="text-exercise-title">Ejercicio — Rellena los huecos</div>
    <div class="text-body" id="textBody">`;
  q.segments.forEach(seg=>{
    if(seg.type==='text'){
      html+=seg.content.replace(/\n/g,'<br>');
    } else {
      const state_key=currentModule+'_text_'+seg.id;
      const s=state.questionStates[state_key];
      const answered=s&&s.answered;
      const correct=s&&s.correct;
      let cls='';
      if(answered&&correct) cls='correct-sel';
      else if(answered&&!correct) cls='wrong-sel';
      const transInfo=seg.trans?`data-trans="${seg.trans}"`:'';
      html+=`<span class="q-dropdown-wrap" style="position:relative">
        <select class="q-dropdown ${cls}" data-id="${seg.id}" data-correct="${seg.c}" ${transInfo} ${answered?'disabled':''}>
          <option value="">— elegir —</option>
          ${seg.opts.map(o=>`<option value="${o}" ${(s&&s.selected===o)?'selected':''}>${o}</option>`).join('')}
        </select>
        <span class="dropdown-arrow">▾</span>
        ${answered?`<div class="dropdown-feedback show ${correct?'green':'red'}">
          ${correct?'✓ ¡Correcto!':'✗ Era: <strong>'+seg.c+'</strong>'}<br>
          <span style="opacity:0.9;font-size:11px">🇪🇸 ${seg.trans||seg.c}</span>
        </div>`:''}
      </span>`;
    }
  });
  html+=`</div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border2);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--text3)">Cada hueco vale 10 XP</span>
      <button class="ctrl-btn" onclick="checkTextExercise()" style="margin-left:auto">Comprobar todos</button>
      <button class="ctrl-btn danger" onclick="resetTextExercise()">Reiniciar</button>
    </div>
  </div>`;
  return html;
}

function handleDropdownChange(sel,modKey){
  const id=sel.dataset.id;
  const correct=sel.dataset.correct;
  const val=sel.value;
  if(!val) return;
  const state_key=modKey+'_text_'+id;
  const isCorrect=val.trim().toLowerCase()===correct.trim().toLowerCase();
  state.questionStates[state_key]={answered:true,correct:isCorrect,selected:val};
  sel.disabled=true;
  sel.className='q-dropdown '+(isCorrect?'correct-sel':'wrong-sel');

  // Show feedback bubble
  const wrap=sel.closest('.q-dropdown-wrap');
  if(wrap){
    let existFb=wrap.querySelector('.dropdown-feedback');
    if(existFb) existFb.remove();
    const fb=document.createElement('div');
    const transText=sel.dataset.trans||correct;
    fb.className='dropdown-feedback show '+(isCorrect?'green':'red');
    fb.innerHTML=isCorrect
      ?`✓ ¡Correcto!<br><span style="opacity:0.9;font-size:11px">🇪🇸 ${transText}</span>`
      :`✗ Era: <strong>${correct}</strong><br><span style="opacity:0.9;font-size:11px">🇪🇸 ${transText}</span>`;
    wrap.appendChild(fb);
    setTimeout(()=>{ if(fb.parentNode) fb.style.opacity='0'; }, 3500);
    setTimeout(()=>{ if(fb.parentNode) fb.remove(); }, 3800);
  }

  if(isCorrect){
    state.xp+=10;state.streak++;
    if(state.streak>state.maxStreak) state.maxStreak=state.streak;
    showToast('✓ ¡Correcto! +10 XP','success-t');
  } else {
    state.streak=0;
    showToast('✗ Era: '+correct,'error-t');
  }
  updateModuleProgressText(modKey);
  state.totalAnswered=Object.values(state.questionStates).filter(s=>s.answered).length;
  state.totalCorrect=Object.values(state.questionStates).filter(s=>s.answered&&s.correct).length;
  updateStats();
  renderSidebar();
  const mod=modules[modKey];
  const textQ=mod.questions.find(q=>q.mode==='text');
  const total=textQ.segments.filter(s=>s.type==='drop').length;
  const prog=state.moduleProgress[modKey]||{answered:0,correct:0};
  const pct=total>0?Math.round(prog.answered/total*100):0;
  const pf=document.getElementById('progFill');
  if(pf) pf.style.width=pct+'%';
  const pc=document.getElementById('progCount');
  if(pc) pc.textContent=prog.answered+' / '+total+' respondidas · '+prog.correct+' correctas';
}

function updateModuleProgressText(modKey){
  const mod=modules[modKey];
  const textQ=mod.questions.find(q=>q.mode==='text');
  let answered=0,correct2=0;
  textQ.segments.filter(s=>s.type==='drop').forEach(s=>{
    const sk=modKey+'_text_'+s.id;
    if(state.questionStates[sk]&&state.questionStates[sk].answered){
      answered++;
      if(state.questionStates[sk].correct) correct2++;
    }
  });
  state.moduleProgress[modKey]={answered,correct:correct2};
}

function checkTextExercise(){
  document.querySelectorAll('.q-dropdown:not(:disabled)').forEach(sel=>{
    if(sel.value) handleDropdownChange(sel,currentModule);
  });
}
function resetTextExercise(){
  const mod=modules[currentModule];
  const textQ=mod.questions.find(q=>q.mode==='text');
  textQ.segments.filter(s=>s.type==='drop').forEach(s=>{
    delete state.questionStates[currentModule+'_text_'+s.id];
  });
  state.moduleProgress[currentModule]={answered:0,correct:0};
  renderContent();renderSidebar();updateStats();
}

// ============================================================
// MCQ
// ============================================================
function wrapWordsForTooltip(text){
  return text.split(/(\s+)/).map(part=>{
    if(/\s+/.test(part)) return part;
    return `<span class="word" data-word="${part.replace(/[.,!?;:'"()\[\]]/g,'')}">${part}</span>`;
  }).join('');
}

function renderMCQ(q,idx,modKey){
  const state_key=modKey+'_'+idx;
  const s=state.questionStates[state_key];
  const answered=s&&s.answered;
  const letters=['A','B','C','D'];
  let cardCls='q-card';
  if(answered) cardCls+=' answered '+(s.correct?'correct-card':'wrong-card');
  const promptText=q.p.replace('_______','_______');
  const promptHtml=answered
    ? '<span class="clickable-words">'+wrapWordsForTooltip(promptText).replace('_______','<em class="q-blank">_______</em>')+'</span>'
    : promptText.replace('_______','<em class="q-blank">_______</em>');
  let optionsHtml='<div class="options-grid">';
  q.r.forEach((opt,oi)=>{
    let cls='opt-btn';
    if(answered){
      if(opt===q.c&&s.selected===opt) cls+=' correct-opt';
      else if(opt===q.c) cls+=' reveal-correct';
      else if(s.selected===opt&&opt!==q.c) cls+=' wrong-opt';
    }
    const disabled=answered?'disabled':'';
    optionsHtml+=`<button class="${cls}" ${disabled} onclick="answerMCQ('${modKey}',${idx},'${opt.replace(/'/g,"\\'")}')">
      <span class="opt-letter">${letters[oi]}</span>
      <span>${opt}</span>
    </button>`;
  });
  optionsHtml+='</div>';
  let feedbackHtml='';
  if(answered){
    const fbCls=s.correct?'feedback show correct-fb':'feedback show wrong-fb';
    const fbIcon=s.correct?'✓':'✗';
    const fbMsg=s.correct?'¡Correcto!':`Incorrecto. La respuesta es: <strong>${q.c}</strong>`;
    feedbackHtml=`<div class="${fbCls}"><span class="fb-icon">${fbIcon}</span><div>${fbMsg}<span class="fb-translation">${q.e}</span></div></div>`;
  }
  return `<div class="${cardCls}" id="qcard_${modKey.replace(/[^a-z0-9]/gi,'_')}_${idx}">
    <div class="q-num">PREGUNTA ${idx+1} / ${modules[modKey].questions.length}</div>
    <div class="q-text ${answered?'clickable-words':''}">${promptHtml}</div>
    ${optionsHtml}
    ${feedbackHtml}
  </div>`;
}

function answerMCQ(modKey,idx,selected){
  const q=modules[modKey].questions[idx];
  const state_key=modKey+'_'+idx;
  if(state.questionStates[state_key]&&state.questionStates[state_key].answered) return;
  const isCorrect=selected.trim().toLowerCase()===q.c.trim().toLowerCase();
  state.questionStates[state_key]={answered:true,correct:isCorrect,selected};
  if(isCorrect){
    state.xp+=10;state.streak++;
    if(state.streak>state.maxStreak) state.maxStreak=state.streak;
    showToast('✓ ¡Correcto! +10 XP','success-t');
  } else {
    state.streak=0;
    showToast('✗ Era: '+q.c,'error-t');
  }
  const mod=modules[modKey];
  let answered=0,correct=0;
  mod.questions.forEach((q2,i2)=>{
    const sk=modKey+'_'+i2;
    if(state.questionStates[sk]&&state.questionStates[sk].answered){
      answered++;
      if(state.questionStates[sk].correct) correct++;
    }
  });
  state.moduleProgress[modKey]={answered,correct};
  state.totalAnswered=Object.values(state.questionStates).filter(s=>s.answered).length;
  state.totalCorrect=Object.values(state.questionStates).filter(s=>s.answered&&s.correct).length;
  updateStats();renderSidebar();
  const cardId='qcard_'+modKey.replace(/[^a-z0-9]/gi,'_')+'_'+idx;
  const el=document.getElementById(cardId);
  if(el){ el.outerHTML=renderMCQ(q,idx,modKey); attachWordTooltips(); }
  const total=mod.questions.length;
  const pct=total>0?Math.round(answered/total*100):0;
  const pf=document.getElementById('progFill');
  if(pf) pf.style.width=pct+'%';
  const pc=document.getElementById('progCount');
  if(pc) pc.textContent=answered+' / '+total+' respondidas · '+correct+' correctas';
}

// ============================================================
// WORD TOOLTIP
// ============================================================
function attachWordTooltips(){
  document.querySelectorAll('.q-text.clickable-words span.word').forEach(span=>{
    span.addEventListener('mouseenter', showWordTooltip);
    span.addEventListener('mouseleave', hideWordTooltip);
    span.addEventListener('click', showWordTooltip);
  });
}

const tooltip=document.getElementById('wordTooltip');
function showWordTooltip(e){
  const word=e.target.dataset.word;
  if(!word) return;
  const trans=getTranslation(word);
  if(!trans) return;
  tooltip.textContent='🇪🇸 '+trans;
  tooltip.style.display='block';
  const rect=e.target.getBoundingClientRect();
  tooltip.style.left=(rect.left+rect.width/2)+'px';
  tooltip.style.top=(rect.top-36+window.scrollY)+'px';
  tooltip.style.opacity='1';
}
function hideWordTooltip(){
  tooltip.style.opacity='0';
  setTimeout(()=>{ tooltip.style.display='none'; },150);
}

// ============================================================
// CONTROLS
// ============================================================
function resetModule(){
  const mod=modules[currentModule];
  mod.questions.forEach((q,i)=>{ delete state.questionStates[currentModule+'_'+i]; });
  mod.questions.filter(q=>q.mode==='text').forEach(q=>{
    q.segments.filter(s=>s.type==='drop').forEach(s=>{
      delete state.questionStates[currentModule+'_text_'+s.id];
    });
  });
  state.moduleProgress[currentModule]={answered:0,correct:0};
  state.totalAnswered=Object.values(state.questionStates).filter(s=>s.answered).length;
  state.totalCorrect=Object.values(state.questionStates).filter(s=>s.answered&&s.correct).length;
  updateStats();renderSidebar();renderContent();
  showToast('Módulo reiniciado','');
}

function revealAll(){
  const mod=modules[currentModule];
  mod.questions.filter(q=>q.mode!=='text').forEach((q,i)=>{
    const sk=currentModule+'_'+i;
    if(!state.questionStates[sk]||!state.questionStates[sk].answered){
      state.questionStates[sk]={answered:true,correct:false,selected:'__revealed__'};
    }
  });
  let answered=0,correct=0;
  mod.questions.forEach((q,i)=>{
    const sk=currentModule+'_'+i;
    if(state.questionStates[sk]&&state.questionStates[sk].answered){answered++;if(state.questionStates[sk].correct)correct++;}
  });
  state.moduleProgress[currentModule]={answered,correct};
  state.totalAnswered=Object.values(state.questionStates).filter(s=>s.answered).length;
  state.totalCorrect=Object.values(state.questionStates).filter(s=>s.answered&&s.correct).length;
  updateStats();renderSidebar();renderContent();attachWordTooltips();
}

function checkAllAndShowResults(){
  const mod=modules[currentModule];
  const prog=state.moduleProgress[currentModule]||{answered:0,correct:0};
  const total=mod.questions.length;
  const wrong=prog.answered-prog.correct;
  const rate=prog.answered>0?Math.round(prog.correct/prog.answered*100):0;
  let grade='—';
  if(prog.answered>0){
    if(rate>=90) grade='🏆 Excelente';
    else if(rate>=70) grade='✓ Bien';
    else if(rate>=50) grade='~ Mejorable';
    else grade='✗ Repasar';
  }
  const panel=document.getElementById('resultsPanel');
  panel.className='results-panel show';
  panel.innerHTML=`
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px">
      Resultados del módulo
      <span style="background:rgba(124,111,247,0.1);color:var(--accent3);font-size:11px;padding:2px 8px;border-radius:6px;font-family:var(--mono)">${grade}</span>
    </div>
    <div class="results-grid">
      <div class="r-stat"><div class="r-stat-val a">${prog.answered}</div><div class="r-stat-label">Respondidas</div></div>
      <div class="r-stat"><div class="r-stat-val g">${prog.correct}</div><div class="r-stat-label">Correctas</div></div>
      <div class="r-stat"><div class="r-stat-val r">${wrong}</div><div class="r-stat-label">Incorrectas</div></div>
      <div class="r-stat"><div class="r-stat-val y">${rate}%</div><div class="r-stat-label">Precisión</div></div>
    </div>
    <div class="perf-bar-wrap">
      <div class="perf-bar-label"><span>Correctas</span><span>${prog.correct} / ${total}</span></div>
      <div class="perf-bar"><div class="perf-fill g" style="width:${total>0?Math.round(prog.correct/total*100):0}%"></div></div>
    </div>
    <div class="perf-bar-wrap">
      <div class="perf-bar-label"><span>Incorrectas</span><span>${wrong} / ${total}</span></div>
      <div class="perf-bar"><div class="perf-fill r" style="width:${total>0?Math.round(wrong/total*100):0}%"></div></div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-top:8px">XP total ganado en esta sesión: <span style="color:var(--accent3);font-family:var(--mono);font-weight:700">${state.xp}</span></div>
  `;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg,cls){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+cls;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.className='toast'; },2000);
}

// ============================================================
// INIT
// ============================================================
renderSidebar();
renderContent();
updateStats();
// Attach tooltips after first render
setTimeout(attachWordTooltips, 100);
</script>
</body>
</html>
